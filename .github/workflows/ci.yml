name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  pipeline:
    name: Data pipeline (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/data-pipeline/requirements.txt
            services/data-pipeline/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest -q

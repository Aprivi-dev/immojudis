name: Immojudis Data Pipeline

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "auction_runs id to execute. Leave empty to process the oldest queued run."
        required: false
        type: string
      source:
        description: "Source to collect"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - avoventes
          - licitor
          - vench
          - info_encheres
          - encheres_publiques
          - petites_affiches
          - cessions_etat
          - agrasc
          - encheres_immobilieres
          - notaires
      limit:
        description: "Optional raw listing limit"
        required: false
        type: string
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: immojudis-data-pipeline
  cancel-in-progress: false

jobs:
  run:
    name: Run data pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: services/data-pipeline
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      LLM_ENABLED: true
      LLM_PROVIDER: replicate
      LLM_PROMPT_VERSION: auction_llm_v5
      PDF_EXTRACTOR: auto
      PDF_DOCLING_ENABLED: true
      PDF_OCR_ENABLED: true
      ENABLE_LICITOR_BENCHMARK: true
      ENABLE_VENCH_BENCHMARK: true
      ENABLE_INFO_ENCHERES_BENCHMARK: true
      ENABLE_ENCHERES_PUBLIQUES_BENCHMARK: true
      ENABLE_PETITES_AFFICHES_BENCHMARK: true
      ENABLE_CESSIONS_ETAT_BENCHMARK: true
      ENABLE_AGRASC_BENCHMARK: true
      ENABLE_ENCHERES_IMMOBILIERES_BENCHMARK: true
      ENABLE_NOTAIRES_BENCHMARK: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/data-pipeline/requirements.txt

      - name: Restore pipeline extraction cache
        uses: actions/cache@v4
        with:
          path: |
            services/data-pipeline/data/documents
            services/data-pipeline/data/raw/pdf_texts
            services/data-pipeline/data/raw/docling_texts
            services/data-pipeline/data/processed/llm_extractions
          key: immojudis-data-pipeline-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            immojudis-data-pipeline-${{ runner.os }}-

      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra tesseract-ocr-eng

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run requested or queued pipeline
        env:
          REQUESTED_RUN_ID: ${{ github.event.inputs.run_id }}
          REQUESTED_SOURCE: ${{ github.event.inputs.source }}
          REQUESTED_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail

          if [ -n "$REQUESTED_RUN_ID" ] || [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            args=(--source "${REQUESTED_SOURCE:-all}")
            if [ -n "$REQUESTED_RUN_ID" ]; then
              args+=(--run-id "$REQUESTED_RUN_ID")
            fi
            if [ -n "$REQUESTED_LIMIT" ]; then
              args+=(--limit "$REQUESTED_LIMIT")
            fi
            python -m src.main "${args[@]}"
          else
            python -m src.queued_runner
          fi

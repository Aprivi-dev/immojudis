name: Immojudis Data Pipeline

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "auction_runs id to execute. Leave empty to process the oldest queued run."
        required: false
        type: string
      source:
        description: "Source to collect"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - avoventes
          - licitor
          - vench
          - info_encheres
          - encheres_publiques
          - petites_affiches
          - cessions_etat
          - agrasc
          - encheres_immobilieres
          - notaires
      limit:
        description: "Optional raw listing limit"
        required: false
        type: string
      llm_backfill:
        description: "Backfill missing AI display descriptions from existing Supabase rows"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: immojudis-data-pipeline
  cancel-in-progress: false

jobs:
  run:
    name: Run data pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: services/data-pipeline
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      PIPELINE_ENRICH_WORKERS: 2
      PIPELINE_LLM_WORKERS: 1
      PIPELINE_PDF_MAX_TARGETS: 10
      PIPELINE_LLM_MAX_TARGETS: 10
      PIPELINE_LLM_BACKFILL_MAX_TARGETS: 20
      PIPELINE_LLM_BACKFILL_PROGRESS_EVERY: 5
      PIPELINE_IDLE_LLM_BACKFILL_ENABLED: false
      REPLICATE_MIN_INTERVAL_SECONDS: 15
      REPLICATE_MAX_RETRIES: 4
      REPLICATE_RETRY_BACKOFF_SECONDS: 30
      REPLICATE_RETRY_MAX_SLEEP_SECONDS: 60
      REPLICATE_MAX_TOKENS: 1024
      LLM_EXTRACTION_MODE: display_description
      LLM_PDF_MAX_CHARS: 6000
      LLM_ENABLED: true
      LLM_PROVIDER: replicate
      LLM_PROMPT_VERSION: auction_llm_v6_display
      PDF_EXTRACTOR: auto
      PDF_DOCLING_ENABLED: false
      PDF_OCR_ENABLED: false
      PDF_MAX_DOCUMENTS_PER_SALE: 2
      ENABLE_LICITOR_BENCHMARK: true
      ENABLE_VENCH_BENCHMARK: true
      ENABLE_INFO_ENCHERES_BENCHMARK: true
      ENABLE_ENCHERES_PUBLIQUES_BENCHMARK: true
      ENABLE_PETITES_AFFICHES_BENCHMARK: true
      ENABLE_CESSIONS_ETAT_BENCHMARK: true
      ENABLE_AGRASC_BENCHMARK: true
      ENABLE_ENCHERES_IMMOBILIERES_BENCHMARK: true
      ENABLE_NOTAIRES_BENCHMARK: true
    steps:
      - name: Preflight scheduled work
        id: preflight
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME:-}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual_or_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=missing_supabase_env" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rest_url="${SUPABASE_URL%/}/rest/v1"
          auth_headers=(
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Accept: application/json"
          )

          has_rows() {
            local table="$1"
            shift
            local response
            if ! response="$(curl -fsS --get "${auth_headers[@]}" "$rest_url/$table" "$@")"; then
              echo "Preflight query failed for $table; running full worker."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "reason=preflight_query_failed" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            [ "$(jq 'length' <<< "$response")" -gt 0 ]
          }

          cutoff="$(date -u -d '190 minutes ago' +'%Y-%m-%dT%H:%M:%SZ')"
          now="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if has_rows auction_runs \
            --data-urlencode "select=id" \
            --data-urlencode "status=eq.queued" \
            --data-urlencode "limit=1"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=queued_auction_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if has_rows data_refresh_requests \
            --data-urlencode "select=id" \
            --data-urlencode "status=eq.queued" \
            --data-urlencode "limit=1"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=queued_data_refresh" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if has_rows auction_runs \
            --data-urlencode "select=id" \
            --data-urlencode "status=eq.running" \
            --data-urlencode "started_at=lt.$cutoff" \
            --data-urlencode "limit=1"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=stale_running_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if has_rows auction_sales \
            --data-urlencode "select=source_url" \
            --data-urlencode "sale_date=lt.$now" \
            --data-urlencode "or=(status.eq.active,status.eq.upcoming)" \
            --data-urlencode "limit=1"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=past_sales_maintenance" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No queued data work found; skipping dependency setup."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "reason=no_scheduled_work" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/data-pipeline/requirements.txt

      - name: Restore pipeline extraction cache
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            services/data-pipeline/data/documents
            services/data-pipeline/data/raw/pdf_texts
            services/data-pipeline/data/raw/docling_texts
            services/data-pipeline/data/processed/llm_extractions
          key: immojudis-data-pipeline-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            immojudis-data-pipeline-${{ runner.os }}-

      - name: Install OCR system packages
        if: steps.preflight.outputs.should_run == 'true' && env.PDF_OCR_ENABLED == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra tesseract-ocr-eng

      - name: Install Python dependencies
        if: steps.preflight.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run requested or queued pipeline
        if: steps.preflight.outputs.should_run == 'true'
        env:
          REQUESTED_RUN_ID: ${{ github.event.inputs.run_id }}
          REQUESTED_SOURCE: ${{ github.event.inputs.source }}
          REQUESTED_LIMIT: ${{ github.event.inputs.limit }}
          REQUESTED_LLM_BACKFILL: ${{ github.event.inputs.llm_backfill }}
        run: |
          set -euo pipefail

          if [ -n "$REQUESTED_RUN_ID" ] || [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            args=(--source "${REQUESTED_SOURCE:-all}")
            if [ "${REQUESTED_LLM_BACKFILL:-false}" = "true" ]; then
              args+=(--backfill-llm-descriptions)
            fi
            if [ -n "$REQUESTED_RUN_ID" ]; then
              args+=(--run-id "$REQUESTED_RUN_ID")
            fi
            if [ -n "$REQUESTED_LIMIT" ]; then
              args+=(--limit "$REQUESTED_LIMIT")
            fi
            python -m src.main "${args[@]}"
          else
            python -m src.queued_runner
          fi

name: Apply Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      confirm_target:
        description: "Type production to apply the audited Supabase migrations"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: immojudis-supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    name: Apply audited migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Check target confirmation
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm_target }}" != "production" ]; then
            echo "confirm_target must be exactly: production" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Apply pending migrations
        run: node scripts/apply-supabase-migrations.mjs
